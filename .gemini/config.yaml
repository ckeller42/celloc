# Gemini Code Assist for GitHub — second AI reviewer alongside CodeRabbit.
# Install the app: https://github.com/marketplace/gemini-code-assist
# Docs: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github
have_fun: false
code_review:
  disable: false
  # Keep noise low: with required_conversation_resolution every comment must be
  # resolved before merge, so only surface medium+ severity findings.
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
ignore_patterns:
  - "dist/**"
  - "**/*.ipk"
  - "**/testdata/**"
